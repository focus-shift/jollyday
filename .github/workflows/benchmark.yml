name: Benchmark

on:
  schedule:
    - cron: "15 0 * * *"
  push:
    branches:
      - main
      - 2.x
  pull_request:
  workflow_dispatch:

env:
  MAVEN_ARGS: "--no-transfer-progress --errors --fail-at-end --show-version"

jobs:
  build:
    name: benchmark
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Set up JDK from .tool-versions
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: 'temurin'
          java-version-file: ".tool-versions"
          cache: 'maven'
      - name: Build
        run: ./mvnw verify -Dtests.groups=BenchmarkTest
